[wsl.l]
Descricao=Lista distros wsl
Comando=wsl -l -v
[wsl.u]
Descricao=entra na ubuntu2404
Comando=wsl -d Ubuntu2404
[wsl.f]
Descricao=finaliza todas wsl
Comando=wsl --shutdown

[git.add]
Descricao=incluir tudo novos arquivos no git
Comando=git add .
[git.commit]
Descricao=salva alteracoes localmente [%1=mensagem]
Comando=git commit -m '%1'
[git.env.serv]
Comando=git push -u origin %1
Descricao=envia dados salvos para servidor remoto [%1=branch]
[git.env.commit]
Comando=git commit -am '%1' && git push -u origin %2
Descricao=salva dados local com mensagem e envia servidor remoto [%1=mensagem %2=branch]
[git.reset]
Comando=git reset --hard HEAD~1
Descricao=remove o ultimo commit - melhor usar so local
[git.revert]
Comando=git revert HEAD
Descricao=Cria outro commit revertando o ultimo, pode usar hash no lugar de HEAD
[git.list.n]
Comando=git diff --name-only
Descricao=Para alteracoes que ainda nao foram para o (stage)salvas
[git.list.s]
Comando=git diff --cached --name-only
Descricao=Para alteracoes que ja esta no (stage)salvas
[git.list.t]
Comando=git status -sb
Descricao=lista tudo que  mudou
[git.restore]
Comando=git restore --staged %1
Descricao=remove do stage (salvos) use param . para todos [1=arquivo ou .]
[git.set]
Comando=git remote set-url origin https://github.com/%1
Descricao=altera o repositorio remoto para usuario projeto ex: eu/pro.git
[git.url]
Comando=git remote -v
Descricao=mostra a url remota
[git.branch]
Comando=git branch
Descricao=lista branch todas branch e marca atual *
[git.branch.cria]
Comando=git branch %1
Descricao=cria nova branch [1=branch]
[git.branch.move]
Comando=git checkout %1
Descricao=move para a branch [1=branch]
[git.branch.cm]
Comando=git checkout -b %1
Descricao=cria e copia tudo para a novo branch criada [1=branch]
[git.imp.local]
Comando=git merge %1
Descricao=imposta dados para branch atual da branch informada [%1=branch]
[git.delete.local]
Comando=git branch -d %1
Descricao=deleta branche local [1=branch]
[git.delete.serv]
Comando=git push origin --delete %1
Descricao=deleta branche servidor origin (github) [1=branch remota]

[find.l]
Descricao=Pesquisa no diretorio local  [%1=palavra %2=arquivos tipo *.*]
Comando=findstr /i /n /c:'%1' %2
[find.a]
Descricao=Pesquisa no diretorio local e subs  [%1=palavra %2=arquivos tipo *.*]
Comando=findstr /s /i /n /c:'%1' %2
[Recall.on]
Descricao=Habilita funcao de captura de tela e historico do windows
Comando=dism /online /Enable-Feature /FeatureName:Recall
[Recall.off]
Descricao=Desabilita funcao de captura de tela e historico do windows
Comando=dism /online /Disable-Feature /FeatureName:Recall /Remove
[Recall.inf]
Descricao=Informa sobre funcao de captura de tela e historico do windows
Comando=Dism /Online /Get-Featureinfo /Featurename:Recall
[wg.pesquisa]
Descricao=Pesquisa programa para downloads
Comando=winget search '%1'
[wg.instala]
Descricao=Instala programa
Comando=winget install '%1'
[wg.desinstala]
Descricao=Desintala programa
Comando=winget uninstall '%1'
[wg.atualizar]
Descricao=Atualiza programas que tem atualiza  o para fazer
Comando=winget upgrade --all
[wg.desatualizados]
Descricao=Lista todos programas que tem atualiza  o para fazer
Comando=winget upgrade
[wg.atualiza]
Descricao=Atualiza programa informado por nome ou ID
Comando=winget upgrade '%1'
[wg.lista]
Descricao=Lista todos programas instalados
Comando=winget list
[ip.listadns]
Comando=ipconfig /displaydns
Descricao=lista todos sites acessados
[ip.apagadns]
Comando=ipconfig /flushdns
Descricao=apaga todos sites acessados
[wg.git]
Comando=winget install --id Git.Git -e --source winget
Descricao=instala git direto sem parametros
[wg.sourcetree]
Comando=winget install -e --id Atlassian.Sourcetree
Descricao=instala SourceTree direto sem parametros
[arq.certificar]
Comando=certutil -hashfile '%1' sha256
Descricao=Certifica o rash do arquivo
[arq.testesh256]
Comando=certutil -hashfile '%1' sha256
Descricao=Certifica o rash do arquivo
[arq.testes256]
Comando=certutil -hashfile '%1' sha256
Descricao=Certifica o rash do arquivo
[arq.testessha1]
Comando=certutil -hashfile '%1' sha1
Descricao=Certifica o rash do arquivo
[win.list]
Comando=powercfg /list
Descricao=mostra planos de energia do computador
[win.maximo]
Comando=powercfg -duplicatescheme e9a42b02-d5df-448d-aa00-03f14749eb61
Descricao=ativo desempenho maximo no plano de energia
[win.hibernar.off]
Comando=powercfg -h off
Descricao=desativo hibernar, libera espa o no disco
[win.hibernar.on]
Comando=powercfg -h on
Descricao=ativo hibernar, consome espa o no disco
[win.hibernar.list]
Comando=powercfg /a
Descricao=lista estados do windows, como hibernar ativo
